<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;">
    <div class="toast" [class.show]="toast.show" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="toast-header" [class]="getHeaderClass()">
        <i [class]="getIcon() + ' me-2'"></i>
        <strong class="me-auto">{{ toast.title }}</strong>
        <button type="button" class="btn-close btn-close-white" (click)="hide()"></button>
      </div>
      <div class="toast-body">
        {{ toast.message }}
      </div>
    </div>
  </div>
